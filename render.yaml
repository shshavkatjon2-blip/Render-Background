services:
  - type: worker
    name: vidipay-payment-scanner-3m-0
    runtime: node
    plan: standard
    buildCommand: npm ci --omit=dev
    startCommand: npm run start:scanner
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKER_MODE
        value: scanner
      - key: PAYMENT_SCANNER_ENABLED
        value: true
      - key: PAYMENT_SCANNER_WORKER_ID
        value: scanner-3m-0
      - key: PAYMENT_SCANNER_SHARD_COUNT
        value: 4
      - key: PAYMENT_SCANNER_SHARD_INDEX
        value: 0
      - key: PAYMENT_SCAN_INTERVAL_MS
        value: 10000
      - key: PAYMENT_SCAN_BATCH_SIZE
        value: 100
      - key: PAYMENT_SCAN_CONCURRENCY
        value: 8
      - key: RATE_LIMIT_BACKEND
        value: memory
      - key: TONAPI_BASE_URL
        value: https://tonapi.io
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TONAPI_KEY
        sync: false
