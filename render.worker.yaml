services:
  - type: worker
    name: vidipay-payment-scanner-1-5m
    runtime: node
    plan: standard
    buildCommand: npm ci --omit=dev
    startCommand: npm run start:scanner
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKER_MODE
        value: scanner
      - key: PAYMENT_SCANNER_ENABLED
        value: true
      - key: PAYMENT_SCANNER_WORKER_ID
        value: scanner-render-1
      - key: TONAPI_BASE_URL
        value: https://tonapi.io
      - key: PAYMENT_SCAN_INTERVAL_MS
        value: 15000
      - key: PAYMENT_SCAN_BATCH_SIZE
        value: 50
      - key: RATE_LIMIT_BACKEND
        value: memory
      - key: TON_AUTO_PAYOUT_ENABLED
        value: false
      - key: TON_SIGNER_ENABLED
        value: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TONAPI_KEY
        sync: false
